name: speech-assignment2
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10
  
  # PyTorch (GPU/CPU)
  - pytorch::pytorch::2.0.1
  - pytorch::torchaudio::2.0.2
  - pytorch::torchvision::0.15.2
  - pytorch::pytorch-cuda=11.8  # Change to pytorch-cpu if no GPU
  
  # Core dependencies
  - pip
  - numpy=1.23.5
  - scipy=1.10.1
  - scikit-learn=1.3.0
  - matplotlib=3.7.1
  - pandas=2.0.2
  
  # Audio processing
  - librosa=0.10.0
  - soundfile=0.12.1
  
  # Jupyter
  - jupyter=1.0.0
  - ipython=8.12.0
  
  # Utilities
  - pyyaml=6.0
  - tqdm
  
  # Pip dependencies (packages not in conda)
  - pip
  
  - pip:
    - openai-whisper==20230314
    - transformers==4.30.2
    - huggingface-hub==0.16.2
    - resemblyzer==0.1.1.dev0
    - fastdtw==0.3.4
    - jiwer==3.0.1
    - kagglehub==0.2.0
    - pydantic==2.0.0
    - python-dotenv==1.0.0
